version: "3.9"

services:

  # ── Neo4j Graph Database ─────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: assetiq-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - assetiq-net

  # ── Backend FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: assetiq-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - CHROMA_DB_PATH=/app/data/chroma_db
      - SQLITE_DB_PATH=/app/data/assetiq.db
    volumes:
      - ./data:/app/data          # persist data between restarts
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - assetiq-net
    restart: unless-stopped

  # ── Frontend React ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: assetiq-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - assetiq-net
    restart: unless-stopped

networks:
  assetiq-net:
    driver: bridge

volumes:
  neo4j_data: